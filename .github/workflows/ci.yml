name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_AUTH_JWT_SECRET: ${{ secrets.CI_APP_AUTH_JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: "26"

      - uses: gradle/actions/setup-gradle@v4

      - name: Check Docker
        run: docker info

      - name: Build and test
        run: ./gradlew --no-daemon check bootJar
