name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_AUTH_JWT_SECRET: ${{ secrets.CI_APP_AUTH_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: "26"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate CI secret
        shell: bash
        run: |
          if [ ${#APP_AUTH_JWT_SECRET} -lt 32 ]; then
            echo "CI_APP_AUTH_JWT_SECRET must be at least 32 characters."
            exit 1
          fi

      - name: Check Docker
        run: docker info

      - name: Build and test
        run: ./gradlew --no-daemon check bootJar