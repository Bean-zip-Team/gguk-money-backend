name: "Task"
description: "꾹머니 백엔드 작업 이슈 템플릿"
title: "[TASK] "
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### 브랜치 전략
        이 프로젝트는 Git Flow 전략을 따릅니다.

        - 모든 작업은 이슈 기반 브랜치에서 진행합니다.
        - main, develop 브랜치에 직접 push/commit 하지 않고 PR로만 머지합니다.
        - 작업 브랜치는 develop에서 생성하며 이름은 타입/이슈번호 형식을 사용합니다. 예) feature/#1
        - 커밋 메시지는 Conventional Commits 양식을 사용합니다. 예) feat: add auth scaffold

        #### 브랜치 생성 가이드
        ```bash
        git checkout develop
        git pull origin develop
        git checkout -b <타입>/<이슈번호>
        ```

  - type: textarea
    id: work_summary
    attributes:
      label: 작업 내용
      placeholder: "이번 작업의 개요를 간단히 작성해주세요."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 상세 내용
      value: |
        - [ ] 세부 작업 1
        - [ ] 세부 작업 2

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      placeholder: "리뷰어나 팀원이 알아야 할 추가 맥락이 있다면 작성해주세요."

  - type: textarea
    id: expected_result
    attributes:
      label: 기대 결과
      description: "사용자가 확인할 수 있는 최종 결과나 검증 기준을 적어주세요."

  - type: checkboxes
    id: branch_policy
    attributes:
      label: 브랜치/PR 정책 확인
      description: "제출 전 아래 항목을 모두 확인하세요."
      options:
        - label: develop에서 브랜치를 생성한다.
          required: true
        - label: main, develop에 직접 push/commit 하지 않는다.
          required: true
        - label: PR 대상은 develop 브랜치이다.
          required: true
        - label: 커밋 메시지는 Conventional Commits 양식을 따른다.
          required: true
